name: Train and Deploy Model

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install tensorflow numpy pandas matplotlib seaborn scikit-learn opencv-python pillow dvc
    
    - name: Pull data from DVC
      run: |
        dvc remote add -d localbackup /tmp/dvc-cache 2>/dev/null || true
        dvc pull || echo "No DVC remote configured"
    
    - name: Create synthetic data
      run: |
        python src/create_synthetic_data.py
    
    - name: Update config for quick training
      run: |
        python src/update_config.py
    
    - name: Train model
      run: python src/train.py
    
    - name: Evaluate model
      run: python src/evaluate.py || echo "Evaluation completed"
    
    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: models/
        retention-days: 30
    
    - name: Upload metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: models/test_metrics.csv
        retention-days: 30
    
    - name: Upload evaluation reports
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-reports
        path: |
          models/confusion_matrix.png
          models/classification_report.txt
        retention-days: 30